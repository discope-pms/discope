<app-content-layout>
    <ng-template #title>
        {{ 'USER_SETTINGS_TITLE' | translate }}
    </ng-template>

    <div *ngIf="user" class="user-container">
        <div class="login">
            {{ user.login }}
        </div>

        <button mat-raised-button
                class="save-btn"
                color="primary"
                (click)="signOut()"
        >
            {{ 'USER_SETTINGS_SIGN_OUT_BTN' | translate }}
        </button>
    </div>

    <mat-select class="lang-select" [value]="selectedLang" (valueChange)="changeLang($event)">
        <mat-option *ngFor="let lang of availableLangList" [value]="lang">
            {{ lang }}
        </mat-option>
    </mat-select>
</app-content-layout>
